name: Release

# Builds the signed FLOSS release APK on every version tag (e.g. 0.1.1) and
# publishes it as a GitHub Release asset. F-Droid downloads this developer-signed
# APK (see `Binaries` in fdroiddata) and ships it after verifying the build is
# reproducible from source.
on:
  push:
    tags:
      - "[0-9]+.[0-9]+*"

permissions:
  contents: write # needed to create the GitHub Release and upload the APK

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # JDK 21 to match F-Droid's build server: D8 emits the dex annotations
      # directory in HashMap iteration order, which differs between JDK 17 and 21.
      # Building the reference APK on 21 keeps classes2.dex reproducible.
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Decode signing keystore
        env:
          SIGNING_KEYSTORE_BASE64: ${{ secrets.SIGNING_KEYSTORE_BASE64 }}
        run: echo "$SIGNING_KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/release.jks"

      - name: Build signed FLOSS release APK
        env:
          SIGNING_KEYSTORE_FILE: ${{ runner.temp }}/release.jks
          SIGNING_KEYSTORE_PASSWORD: ${{ secrets.SIGNING_KEYSTORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
        run: ./gradlew assembleFlossRelease --stacktrace

      - name: Rename APK to a stable asset name
        run: |
          mkdir -p dist
          cp app/build/outputs/apk/floss/release/app-floss-release.apk \
             "dist/l5rcm-companion-${GITHUB_REF_NAME}.apk"

      - name: Publish to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --generate-notes \
            "dist/l5rcm-companion-${GITHUB_REF_NAME}.apk" \
          || gh release upload "$GITHUB_REF_NAME" \
            "dist/l5rcm-companion-${GITHUB_REF_NAME}.apk" --clobber
